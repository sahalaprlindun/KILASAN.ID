[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo_mysql", "apacheHttpd"]

[phases.install]
cmds = ["composer install --no-dev"]

[phases.build]
cmds = [
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force && apache2-foreground"